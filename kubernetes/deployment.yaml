apiVersion: apps/v1
kind: Deployment
metadata:
  name: finalert-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finalert
  template:
    metadata:
      labels:
        app: finalert
    spec:
      containers:
        - name: finalert
          image: finalert:latest
          imagePullPolicy: Never   # image locale minikube
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: finalert-config
            - secretRef:
                name: finalert-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"